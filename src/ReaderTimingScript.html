<script>
function cancelPlaybackFrame() {
  if (state.playbackFrame) {
    cancelAnimationFrame(state.playbackFrame);
    state.playbackFrame = null;
  }
}

function stopPlayback() {
  state.isPlaying = false;
  cancelPlaybackFrame();
  cancelScrollAnimation();
  els.playPauseBtn.textContent = 'Play';
}

function prefersReducedMotion() {
  return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
}

function easeInOutCubic(t) {
  return t < 0.5
    ? 4 * t * t * t
    : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function cancelScrollAnimation() {
  if (state.scrollAnimationFrame) {
    cancelAnimationFrame(state.scrollAnimationFrame);
    state.scrollAnimationFrame = null;
  }
}

function animateViewportScrollTo(targetTop, durationMs) {
  const viewport = els.readerViewport;
  const maxTop = Math.max(0, viewport.scrollHeight - viewport.clientHeight);
  const boundedTargetTop = clamp(targetTop, 0, maxTop);

  cancelScrollAnimation();

  if (durationMs === 0 || prefersReducedMotion()) {
    viewport.scrollTop = boundedTargetTop;
    return;
  }

  const startTop = viewport.scrollTop;
  const delta = boundedTargetTop - startTop;
  if (Math.abs(delta) < 1) {
    viewport.scrollTop = boundedTargetTop;
    return;
  }

  const animationDuration = clamp(durationMs || 220, 120, 480);
  const startedAt = performance.now();

  function step(now) {
    const elapsed = now - startedAt;
    const progress = clamp(elapsed / animationDuration, 0, 1);
    viewport.scrollTop = startTop + (delta * easeInOutCubic(progress));

    if (progress < 1) {
      state.scrollAnimationFrame = requestAnimationFrame(step);
    } else {
      state.scrollAnimationFrame = null;
    }
  }

  state.scrollAnimationFrame = requestAnimationFrame(step);
}

function estimateBaseLineDurationMs(line) {
  const text = (line && line.text ? line.text : '').trim();
  if (!text) return MIN_LINE_DURATION_MS;

  const words = text.split(/\s+/).filter(Boolean).length;
  const pauseMarks = (text.match(/[,:;()]/g) || []).length;
  const stopMarks = (text.match(/[.!?]/g) || []).length;
  const bracketPauses = (text.match(/\[[^\]]+\]/g) || []).length;
  const cueBonus = line && line.isCue ? 160 : 0;
  const wordDurationMs = words * (60000 / BASE_READING_WORDS_PER_MINUTE);
  const punctuationPauseMs = (pauseMarks * 22) + (stopMarks * 110) + (bracketPauses * 1200) + cueBonus;
  return Math.max(MIN_LINE_DURATION_MS, Math.round(wordDurationMs + punctuationPauseMs));
}

function getLineDurationMs(index) {
  return state.playbackLineDurations[index] || 0;
}

function recomputePlaybackTimeline() {
  const previousPosition = state.playbackLineDurations.length
    ? getPlaybackPositionForElapsed(state.playbackElapsedMs || getElapsedDurationForLineIndex(state.activeLineIndex))
    : {
        index: clamp(state.activeLineIndex, 0, Math.max(0, state.lines.length - 1)),
        lineProgress: 0
      };
  const startTimes = [];
  let durations = [];
  let elapsed = 0;

  const readingDurations = state.lineReadWeights.map(function (base) {
    return clamp(Math.round(base / state.speed), MIN_LINE_DURATION_MS, MAX_LINE_DURATION_MS);
  });

  if (readingDurations.length <= 1 || state.lineAnchorScrollTops.length < 2) {
    durations = readingDurations.slice();
  } else {
    const movingReadingDurations = readingDurations.slice(0, -1);
    const finalHoldDuration = readingDurations[readingDurations.length - 1];
    const totalMovingReadingDuration = movingReadingDurations.reduce(function (sum, duration) {
      return sum + duration;
    }, 0);
    const distances = movingReadingDurations.map(function (unused, index) {
      const currentTop = state.lineAnchorScrollTops[index] || 0;
      const nextTop = state.lineAnchorScrollTops[index + 1] || currentTop;
      return Math.max(0, Math.abs(nextTop - currentTop));
    });
    const totalDistance = distances.reduce(function (sum, distance) {
      return sum + distance;
    }, 0);

    if (!totalDistance || !totalMovingReadingDuration) {
      durations = readingDurations.slice();
    } else {
      const blendedMovingDurations = movingReadingDurations.map(function (duration, index) {
        const distanceShare = distances[index] / totalDistance;
        const distanceDuration = totalMovingReadingDuration * distanceShare;
        return (duration * (1 - SCROLL_DISTANCE_BLEND)) + (distanceDuration * SCROLL_DISTANCE_BLEND);
      });
      const blendedMovingTotal = blendedMovingDurations.reduce(function (sum, duration) {
        return sum + duration;
      }, 0);
      const normalizationFactor = blendedMovingTotal
        ? totalMovingReadingDuration / blendedMovingTotal
        : 1;

      durations = blendedMovingDurations.map(function (duration) {
        return Math.max(MIN_LINE_DURATION_MS, Math.round(duration * normalizationFactor));
      });
      durations.push(finalHoldDuration);
    }
  }

  durations.forEach(function (duration) {
    startTimes.push(elapsed);
    elapsed += duration;
  });

  state.playbackLineStartTimes = startTimes;
  state.playbackLineDurations = durations;
  state.playbackTotalDurationMs = elapsed;
  if (durations.length) {
    const preservedIndex = clamp(previousPosition.index, 0, durations.length - 1);
    const preservedStart = startTimes[preservedIndex] || 0;
    const preservedDuration = durations[preservedIndex] || 0;
    state.playbackElapsedMs = clamp(
      preservedStart + (preservedDuration * previousPosition.lineProgress),
      0,
      elapsed
    );
  } else {
    state.playbackElapsedMs = 0;
  }
}

function getElapsedDurationForLineIndex(index) {
  if (!state.playbackLineStartTimes.length) return 0;
  const clampedIndex = clamp(index, 0, Math.max(0, state.playbackLineStartTimes.length - 1));
  return state.playbackLineStartTimes[clampedIndex] || 0;
}

function getElapsedDurationMs() {
  return clamp(state.playbackElapsedMs || 0, 0, getTotalDurationMs());
}

function getRemainingDurationMs() {
  return Math.max(0, getTotalDurationMs() - getElapsedDurationMs());
}

function getTotalDurationMs() {
  return state.playbackTotalDurationMs || 0;
}

function recalculateRenderedLineWeights() {
  const lineEls = els.readerContent.querySelectorAll('.line');

  state.lineReadWeights = state.lines.map(function (line, index) {
    const base = estimateBaseLineDurationMs(line);
    const lineEl = lineEls[index];
    if (!lineEl) return base;

    const computedStyle = window.getComputedStyle(lineEl);
    const lineHeight = parseFloat(computedStyle.lineHeight) || (state.fontSize * 1.2);
    const paddingTop = parseFloat(computedStyle.paddingTop) || 0;
    const paddingBottom = parseFloat(computedStyle.paddingBottom) || 0;
    const measuredHeight = Math.max(0, lineEl.getBoundingClientRect().height - paddingTop - paddingBottom);
    const renderedRows = Math.max(1, Math.round(measuredHeight / Math.max(1, lineHeight)));
    const wrapFactor = 1 + ((renderedRows - 1) * 0.1);
    const sourceBreakFactor = line.sourceBreakBefore ? 1.01 : 1;
    return Math.round(base * wrapFactor * sourceBreakFactor);
  });
}

function getPlaybackPositionForElapsed(elapsedMs) {
  if (!state.lines.length || !state.playbackLineDurations.length) {
    return {
      index: 0,
      lineProgress: 0
    };
  }

  const totalDuration = getTotalDurationMs();
  const clampedElapsed = clamp(elapsedMs, 0, totalDuration);

  for (let i = state.playbackLineDurations.length - 1; i >= 0; i--) {
    const start = state.playbackLineStartTimes[i] || 0;
    if (clampedElapsed >= start || i === 0) {
      const duration = Math.max(1, state.playbackLineDurations[i] || 1);
      const lineProgress = clamp((clampedElapsed - start) / duration, 0, 1);
      return {
        index: i,
        lineProgress: lineProgress
      };
    }
  }

  return {
    index: 0,
    lineProgress: 0
  };
}

function getPlaybackScrollTopForPosition(position) {
  if (!state.lineAnchorScrollTops.length) return 0;

  const currentTarget = state.lineAnchorScrollTops[position.index] || 0;
  const nextIndex = Math.min(position.index + 1, state.lineAnchorScrollTops.length - 1);
  const nextTarget = state.lineAnchorScrollTops[nextIndex] || currentTarget;
  return currentTarget + ((nextTarget - currentTarget) * position.lineProgress);
}

function playbackTick(timestamp) {
  if (!state.isPlaying) return;

  const totalDuration = getTotalDurationMs();
  if (!totalDuration || !state.lines.length) {
    stopPlayback();
    return;
  }

  if (!state.playbackStartedAt) {
    state.playbackStartedAt = timestamp - state.playbackElapsedMs;
  }

  const elapsed = clamp(timestamp - state.playbackStartedAt, 0, totalDuration);
  state.playbackElapsedMs = elapsed;

  const position = getPlaybackPositionForElapsed(elapsed);
  if (position.index !== state.activeLineIndex) {
    setActiveLine(position.index, false, {
      syncPlaybackElapsed: false,
      skipProgress: true
    });
  } else {
    updateCurrentSectionContext();
  }

  els.readerViewport.scrollTop = getPlaybackScrollTopForPosition(position);
  updateProgress();

  if (elapsed >= totalDuration) {
    state.playbackElapsedMs = totalDuration;
    stopPlayback();
    return;
  }

  state.playbackFrame = requestAnimationFrame(playbackTick);
}

function startPlayback() {
  if (!state.lines.length) return;

  if (state.activeLineIndex >= state.lines.length - 1 && state.playbackElapsedMs >= getTotalDurationMs()) {
    setActiveLine(0, true, {
      force: true,
      durationMs: 0
    });
  }

  stopPlayback();
  state.isPlaying = true;
  state.playbackStartedAt = 0;
  els.playPauseBtn.textContent = 'Pause';
  state.playbackFrame = requestAnimationFrame(playbackTick);
}

function togglePlayback() {
  if (state.isPlaying) {
    stopPlayback();
  } else {
    startPlayback();
  }
}

function formatEtaSeconds(seconds) {
  if (!isFinite(seconds) || seconds < 0) return 'ETA --';
  const totalSeconds = Math.max(0, Math.round(seconds));
  const mins = Math.floor(totalSeconds / 60);
  const secs = totalSeconds % 60;
  return mins > 0 ? `ETA ${mins}m ${secs}s` : `ETA ${secs}s`;
}
</script>
