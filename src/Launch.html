<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8" />
    <title>DocPrompter Launch</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 16px;
        color: #222;
      }

      h2 {
        margin-top: 0;
        font-size: 18px;
      }

      .group {
        margin-bottom: 16px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        cursor: pointer;
      }

      .hint {
        font-size: 12px;
        color: #666;
        margin-top: 8px;
      }

      .actions {
        margin-top: 20px;
      }

      button {
        border: 0;
        border-radius: 6px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
      }

      button.primary {
        background: #1a73e8;
        color: white;
      }

      button:disabled {
        opacity: 0.6;
        cursor: default;
      }

      .status {
        font-size: 12px;
        color: #666;
        min-height: 18px;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <h2>Open Reading View</h2>

    <div class="group">
      <strong>Source</strong>
      <label>
        <input type="radio" name="sourceMode" value="selection" id="sourceSelection">
        Current selection
      </label>
      <label>
        <input type="radio" name="sourceMode" value="document" id="sourceDocument">
        Entire document
      </label>
      <div class="hint" id="selectionHint"></div>
    </div>

    <div class="actions">
      <button class="primary" id="openBtn">Open Reading View</button>
    </div>

    <div class="status" id="status"></div>

    <script>
      const statusEl = document.getElementById('status');
      const selectionRadio = document.getElementById('sourceSelection');
      const documentRadio = document.getElementById('sourceDocument');
      const selectionHint = document.getElementById('selectionHint');
      const openBtn = document.getElementById('openBtn');
      let launchContext = null;

      function setStatus(message) {
        statusEl.textContent = message || '';
      }

      function logClientEvent(eventName, payload) {
        if (typeof google === 'undefined' || !google.script || !google.script.run) return;

        google.script.run
          .withFailureHandler(function () {
            /* keep diagnostics best-effort */
          })
          .logClientEvent(eventName, payload || {});
      }

      function getSelectedSourceMode() {
        const checked = document.querySelector('input[name="sourceMode"]:checked');
        return checked ? checked.value : 'document';
      }

      function initialize() {
        setStatus('Checking document...');
        logClientEvent('launch_dialog_initialized', {
          href: window.location.href,
          userAgent: navigator.userAgent
        });

        google.script.run
          .withSuccessHandler(function (context) {
            launchContext = context || {};
            const hasSelection = !!launchContext.hasSelection;

            if (hasSelection) {
              selectionRadio.disabled = false;
              selectionRadio.checked = true;
              documentRadio.checked = false;
              selectionHint.textContent = 'A selection was found and is selected by default.';
            } else {
              selectionRadio.disabled = true;
              documentRadio.checked = true;
              selectionHint.textContent = 'No selection found. Entire document will be used.';
            }

            logClientEvent('launch_context_success', {
              hasSelection: hasSelection,
              docId: launchContext.docId || ''
            });
            setStatus('');
          })
          .withFailureHandler(function (err) {
            selectionRadio.disabled = true;
            documentRadio.checked = true;
            selectionHint.textContent = 'Could not inspect selection. Entire document will be used.';
            setStatus('Error: ' + (err && err.message ? err.message : err));
            logClientEvent('launch_context_error', {
              error: err && err.message ? err.message : String(err)
            });
          })
          .getLaunchContext();
      }

      openBtn.addEventListener('click', function () {
        const sourceMode = getSelectedSourceMode();
        openBtn.disabled = true;
        setStatus('Opening reader...');
        logClientEvent('launch_button_clicked', {
          sourceMode: sourceMode,
          docId: launchContext && launchContext.docId ? launchContext.docId : ''
        });

        google.script.run
          .withSuccessHandler(function (launch) {
            const params = [
              'docId=' + encodeURIComponent(launch.docId),
              'sourceMode=' + encodeURIComponent(launch.sourceMode || sourceMode)
            ];

            if (launch.selectionToken && (launch.sourceMode || sourceMode) === 'selection') {
              params.push('selectionToken=' + encodeURIComponent(launch.selectionToken));
            }

            const readerWindow = window.open(launch.url + '?' + params.join('&'), '_blank');
            if (!readerWindow) {
              setStatus('Popup blocked. Allow popups for this Google Docs / Apps Script flow and try again.');
              openBtn.disabled = false;
              return;
            }

            if (typeof readerWindow.focus === 'function') {
              readerWindow.focus();
            }

            logClientEvent('reader_window_opened', {
              launchUrl: launch.url,
              docId: launch.docId,
              sourceMode: launch.sourceMode || sourceMode
            });
            setStatus('Reader opened in a new tab/window.');
            openBtn.disabled = false;
            if (google.script && google.script.host && google.script.host.close) {
              google.script.host.close();
            }
          })
          .withFailureHandler(function (err) {
            setStatus('Error: ' + (err && err.message ? err.message : err));
            openBtn.disabled = false;
            logClientEvent('prepare_reader_launch_error', {
              error: err && err.message ? err.message : String(err),
              sourceMode: sourceMode
            });
          })
          .prepareReaderLaunch(sourceMode);
      });

      initialize();
    </script>
  </body>
</html>
