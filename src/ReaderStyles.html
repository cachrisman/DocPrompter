<style>
html,
body {
  margin: 0;
  padding: 0;
  height: 100%;
}

body {
  font-family: Arial, sans-serif;
  transition: background 0.2s ease, color 0.2s ease;
  overflow: hidden;
}

body.theme-light {
  background: #f5f7fb;
  color: #1f2937;
}

body.theme-dark {
  background: #111827;
  color: #f9fafb;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100%;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 12px 16px;
  border-bottom: 1px solid rgba(128, 128, 128, 0.25);
  transition: opacity 0.22s ease, transform 0.22s ease;
}

.topbar-left {
  min-width: 0;
}

.doc-title {
  font-size: 18px;
  font-weight: 700;
  line-height: 1.3;
}

.doc-meta {
  font-size: 12px;
  opacity: 0.75;
  margin-top: 4px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.topbar button,
.topbar select,
.controls button,
.controls input {
  font: inherit;
}

button,
select {
  border: 1px solid rgba(128, 128, 128, 0.35);
  background: transparent;
  color: inherit;
  border-radius: 8px;
  padding: 8px 10px;
}

.reader-shell {
  flex: 1;
  min-height: 0;
  display: flex;
  justify-content: center;
  padding: 20px 24px 12px;
}

.reader-viewport {
  width: min(1100px, 100%);
  height: 100%;
  overflow-y: auto;
  padding: 24px 20px 160px;
  box-sizing: border-box;
}

.reader-content {
  max-width: min(31ch, 100%);
  margin: 0 auto;
  line-height: 1.36;
}

.debug-panel {
  margin-top: 18px;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid rgba(128, 128, 128, 0.28);
}

.debug-panel summary {
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
}

.debug-panel pre {
  margin: 10px 0 0;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 12px;
  line-height: 1.45;
}

body.theme-light .debug-panel {
  background: rgba(255, 255, 255, 0.72);
}

body.theme-dark .debug-panel {
  background: rgba(17, 24, 39, 0.55);
}

.help-overlay {
  position: fixed;
  inset: 0;
  z-index: 30;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.help-overlay[hidden] {
  display: none;
}

.help-backdrop {
  position: absolute;
  inset: 0;
  z-index: 0;
  background: rgba(15, 23, 42, 0.68);
  backdrop-filter: blur(4px);
  pointer-events: auto;
}

.help-dialog {
  position: relative;
  z-index: 1;
  width: min(760px, calc(100vw - 32px));
  max-height: calc(100vh - 48px);
  overflow: auto;
  border-radius: 18px;
  padding: 22px 22px 20px;
  box-sizing: border-box;
  border: 1px solid rgba(148, 163, 184, 0.25);
  pointer-events: auto;
}

.help-header {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  align-items: flex-start;
  margin-bottom: 18px;
}

.help-header h2 {
  margin: 0 0 6px;
  font-size: 24px;
}

.help-header p {
  margin: 0;
  opacity: 0.8;
  line-height: 1.5;
}

.help-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.help-card {
  border-radius: 14px;
  padding: 16px;
  border: 1px solid rgba(148, 163, 184, 0.18);
}

.help-card h3 {
  margin: 0 0 10px;
  font-size: 16px;
}

.help-card ul {
  margin: 0;
  padding-left: 18px;
  line-height: 1.55;
}

body.theme-light .help-dialog,
body.theme-light .help-card {
  background: rgba(255, 255, 255, 0.96);
}

body.theme-dark .help-dialog,
body.theme-dark .help-card {
  background: rgba(17, 24, 39, 0.97);
}

.line {
  margin: 0;
  padding: 0.08em 0.34em;
  border-radius: 12px;
  opacity: 0.58;
  transition:
    background 0.15s ease,
    opacity 0.15s ease,
    box-shadow 0.15s ease;
  white-space: pre-wrap;
  text-indent: 0;
  text-wrap: pretty;
  overflow-wrap: anywhere;
  word-break: normal;
  cursor: pointer;
}

.line + .line {
  margin-top: 0.06em;
}

.line-section-start {
  margin-top: 0.5em;
}

.line-source-break {
  margin-top: 0.42em;
}

.line-heading {
  font-weight: 700;
  margin-top: 0.8em;
  opacity: 0.78;
}

.line-list {
  padding-left: 0.28em;
}

.line-table {
  margin-left: 0;
  opacity: 0.68;
}

.line.active {
  opacity: 1;
}

body.theme-light .line.active {
  background: rgba(26, 115, 232, 0.12);
  box-shadow:
    inset 4px 0 0 #1a73e8,
    0 0 0 1px rgba(26, 115, 232, 0.08);
}

body.theme-dark .line.active {
  background: rgba(96, 165, 250, 0.18);
  box-shadow:
    inset 4px 0 0 #60a5fa,
    0 0 0 1px rgba(96, 165, 250, 0.12);
}

body.line-align-center .reader-content {
  text-align: center;
}

.controls {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto 280px;
  align-items: end;
  gap: 16px;
  padding: 14px 24px 18px;
  border-top: 1px solid rgba(128, 128, 128, 0.25);
  transition: opacity 0.18s ease;
}

.controls-left,
.controls-center,
.controls-right {
  display: flex;
  align-items: center;
  gap: 12px;
  transition: opacity 0.22s ease, transform 0.22s ease;
}

.controls-left {
  justify-self: start;
  flex-wrap: wrap;
  min-width: 0;
}

.controls-center {
  justify-self: center;
}

.controls-right {
  justify-self: end;
  width: 280px;
  min-width: 280px;
  max-width: 280px;
}

.slider-control {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
}

.slider-control input {
  width: 140px;
}

.control-label {
  min-width: 38px;
}

.control-value-button {
  min-width: 52px;
  padding: 6px 8px;
  text-align: right;
}

.control-value-input {
  width: 66px;
  padding: 6px 8px;
  border: 1px solid rgba(128, 128, 128, 0.35);
  border-radius: 8px;
  background: transparent;
  color: inherit;
  text-align: right;
  box-sizing: border-box;
  -moz-appearance: textfield;
}

.control-value-input::-webkit-outer-spin-button,
.control-value-input::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.control-value {
  min-width: 36px;
  font-variant-numeric: tabular-nums;
  text-align: right;
  opacity: 0.8;
}

.controls-center button {
  min-width: 72px;
}

.progress-wrap {
  width: 100%;
  min-width: 0;
}

.section-text {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.01em;
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: right;
  width: 100%;
}

.progress-text,
.eta-text {
  font-size: 12px;
  opacity: 0.8;
  text-align: right;
}

.status-text {
  font-size: 12px;
  opacity: 0.72;
  text-align: right;
  margin-bottom: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.eta-text {
  margin-top: 2px;
  margin-bottom: 4px;
}

.timing-text {
  font-size: 12px;
  opacity: 0.76;
  text-align: right;
  margin-bottom: 4px;
}

progress {
  width: 100%;
  height: 10px;
}

body.focus-mode.chrome-idle .topbar,
body.focus-mode.chrome-idle .controls-left,
body.focus-mode.chrome-idle .controls-right {
  opacity: 0;
  pointer-events: none;
}

body.focus-mode.chrome-idle .topbar {
  transform: translateY(-10px);
}

body.focus-mode.chrome-idle .controls-left,
body.focus-mode.chrome-idle .controls-right {
  transform: translateY(10px);
}

body.help-open .topbar,
body.help-open .controls-left,
body.help-open .controls-right {
  opacity: 1;
  transform: none;
}

@media (max-width: 900px) {
  .topbar,
  .controls {
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }

  .topbar-right,
  .controls-left,
  .controls-center,
  .controls-right {
    justify-content: flex-start;
    flex-wrap: wrap;
  }

  .controls-right {
    width: auto;
    min-width: 0;
    max-width: none;
  }

  .reader-viewport {
    padding: 20px 12px 140px;
  }

  .reader-content {
    max-width: 100%;
  }

  .help-grid {
    grid-template-columns: 1fr;
  }

  .help-header {
    flex-direction: column;
  }
}

</style>
