<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DocPrompter Reader</title>
    <?!= include_('ReaderStyles'); ?>
  </head>
  <body class="theme-light">
    <div class="app">
      <header class="topbar">
        <div class="topbar-left">
          <div class="doc-title" id="docTitle">Loading...</div>
          <div class="doc-meta" id="docMeta"></div>
        </div>

        <div class="topbar-right">
          <button id="refreshBtn" title="Refresh from Google Doc">Refresh</button>
          <button id="themeBtn" title="Toggle dark mode">Dark mode</button>
          <button id="focusBtn" title="Toggle focus mode">Focus mode</button>
          <select id="sectionJump" title="Jump to section">
            <option value="">Jump to section...</option>
          </select>
        </div>
      </header>

      <main class="reader-shell">
        <div class="reader-viewport" id="readerViewport">
          <div class="reader-content" id="readerContent"></div>
        </div>
      </main>

      <footer class="controls" id="controlsBar">
        <div class="controls-left">
          <button id="playPauseBtn">Play</button>
          <button id="lineBackBtn" title="Back one line">↑ Back</button>
          <button id="lineForwardBtn" title="Forward one line">↓ Forward</button>
        </div>

        <div class="controls-center">
          <label>
            Speed
            <input id="speedInput" type="range" min="0.2" max="3" step="0.1" value="1.0">
          </label>

          <label>
            Font
            <input id="fontSizeInput" type="range" min="18" max="56" step="1" value="30">
          </label>
        </div>

        <div class="controls-right">
          <div class="progress-wrap">
            <div class="progress-text" id="progressText">0%</div>
            <div class="eta-text" id="etaText">ETA --</div>
            <div class="status-text" id="statusText">Loading...</div>
            <progress id="progressBar" max="100" value="0"></progress>
          </div>
        </div>
      </footer>
    </div>

    <script>
      window.DOC_PROMPTER_BOOTSTRAP = {
        docId: <?= JSON.stringify(docId) ?>,
        sourceMode: <?= JSON.stringify(sourceMode) ?>,
        selectionToken: <?= JSON.stringify(selectionToken) ?>
      };
    </script>

    <script>
      const STORAGE_KEY = 'docprompter.reader.preferences.v1';

      const state = {
        docId: (window.DOC_PROMPTER_BOOTSTRAP && window.DOC_PROMPTER_BOOTSTRAP.docId) || '',
        sourceMode: (window.DOC_PROMPTER_BOOTSTRAP && window.DOC_PROMPTER_BOOTSTRAP.sourceMode) || 'document',
        selectionToken: (window.DOC_PROMPTER_BOOTSTRAP && window.DOC_PROMPTER_BOOTSTRAP.selectionToken) || '',
        payload: null,
        lines: [],
        sections: [],
        activeLineIndex: 0,
        isPlaying: false,
        speed: 1.0,
        fontSize: 30,
        theme: 'light',
        focusMode: false,
        scrollTimer: null,
        lastLoadedVersion: '',
        pollTimer: null,
        isSelectionSnapshot: false
      };

      const els = {
        docTitle: document.getElementById('docTitle'),
        docMeta: document.getElementById('docMeta'),
        readerViewport: document.getElementById('readerViewport'),
        readerContent: document.getElementById('readerContent'),
        playPauseBtn: document.getElementById('playPauseBtn'),
        lineBackBtn: document.getElementById('lineBackBtn'),
        lineForwardBtn: document.getElementById('lineForwardBtn'),
        speedInput: document.getElementById('speedInput'),
        fontSizeInput: document.getElementById('fontSizeInput'),
        progressText: document.getElementById('progressText'),
        etaText: document.getElementById('etaText'),
        statusText: document.getElementById('statusText'),
        progressBar: document.getElementById('progressBar'),
        sectionJump: document.getElementById('sectionJump'),
        refreshBtn: document.getElementById('refreshBtn'),
        themeBtn: document.getElementById('themeBtn'),
        focusBtn: document.getElementById('focusBtn'),
        controlsBar: document.getElementById('controlsBar')
      };

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function loadPreferences() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const prefs = JSON.parse(raw);
          if (typeof prefs.speed === 'number') state.speed = Math.min(3, Math.max(0.2, prefs.speed));
          if (typeof prefs.fontSize === 'number') state.fontSize = Math.min(56, Math.max(18, prefs.fontSize));
          if (prefs.theme === 'dark' || prefs.theme === 'light') state.theme = prefs.theme;
          if (typeof prefs.focusMode === 'boolean') state.focusMode = prefs.focusMode;
        } catch (err) {
          /* ignore bad local state */
        }
      }

      function savePreferences() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({
            speed: state.speed,
            fontSize: state.fontSize,
            theme: state.theme,
            focusMode: state.focusMode
          }));
        } catch (err) {
          /* ignore storage errors */
        }
      }

      function setStatus(message) {
        els.statusText.textContent = message || '';
      }

      function applyThemeUi() {
        document.body.classList.toggle('theme-dark', state.theme === 'dark');
        document.body.classList.toggle('theme-light', state.theme !== 'dark');
        els.themeBtn.textContent = state.theme === 'dark' ? 'Light mode' : 'Dark mode';
      }

      function applyFocusUi() {
        document.body.classList.toggle('focus-mode', state.focusMode);
        els.focusBtn.textContent = state.focusMode ? 'Show controls' : 'Focus mode';
      }

      function applyPreferenceUi() {
        els.speedInput.value = state.speed.toFixed(1);
        els.fontSizeInput.value = String(state.fontSize);
        els.readerContent.style.fontSize = state.fontSize + 'px';
        applyThemeUi();
        applyFocusUi();
      }

      function stopPlayback() {
        state.isPlaying = false;
        if (state.scrollTimer) {
          clearInterval(state.scrollTimer);
          state.scrollTimer = null;
        }
        els.playPauseBtn.textContent = 'Play';
      }

      function startPlayback() {
        if (!state.lines.length) return;

        stopPlayback();
        state.isPlaying = true;
        els.playPauseBtn.textContent = 'Pause';

        const intervalMs = Math.max(120, 700 / state.speed);

        state.scrollTimer = setInterval(() => {
          if (state.activeLineIndex < state.lines.length - 1) {
            setActiveLine(state.activeLineIndex + 1, true);
          } else {
            stopPlayback();
          }
        }, intervalMs);
      }

      function togglePlayback() {
        if (state.isPlaying) {
          stopPlayback();
        } else {
          startPlayback();
        }
      }

      function formatEtaSeconds(seconds) {
        if (!isFinite(seconds) || seconds < 0) return 'ETA --';
        const mins = Math.floor(seconds / 60);
        const secs = Math.round(seconds % 60);
        return mins > 0 ? `ETA ${mins}m ${secs}s` : `ETA ${secs}s`;
      }

      function updateProgress() {
        if (!state.lines.length) {
          els.progressText.textContent = '0%';
          els.progressBar.value = 0;
          els.etaText.textContent = 'ETA --';
          return;
        }

        const pct = Math.round((state.activeLineIndex / Math.max(1, state.lines.length - 1)) * 100);
        els.progressText.textContent = pct + '%';
        els.progressBar.value = pct;

        const remainingLines = Math.max(0, state.lines.length - 1 - state.activeLineIndex);
        const secondsPerLine = 0.7 / state.speed;
        els.etaText.textContent = formatEtaSeconds(remainingLines * secondsPerLine);
      }

      function keepLineInView(lineEl) {
        if (!lineEl) return;

        const viewport = els.readerViewport;
        const lineRect = lineEl.getBoundingClientRect();
        const viewportRect = viewport.getBoundingClientRect();
        const desiredTop = viewport.clientHeight * 0.38;
        const currentTop = lineRect.top - viewportRect.top;
        const delta = currentTop - desiredTop;

        viewport.scrollTo({
          top: viewport.scrollTop + delta,
          behavior: 'smooth'
        });
      }

      function setActiveLine(index, keepVisible) {
        if (!state.lines.length) return;

        index = Math.max(0, Math.min(index, state.lines.length - 1));
        state.activeLineIndex = index;

        const prev = els.readerContent.querySelector('.line.active');
        if (prev) prev.classList.remove('active');

        const lineEl = els.readerContent.querySelector(`.line[data-line-index="${index}"]`);
        if (lineEl) {
          lineEl.classList.add('active');
          if (keepVisible) keepLineInView(lineEl);
        }

        updateProgress();
      }

      function buildSectionJump(sections) {
        els.sectionJump.innerHTML = '<option value="">Jump to section...</option>';

        sections.forEach((section) => {
          if (section.type !== 'heading') return;

          const opt = document.createElement('option');
          opt.value = String(section.firstLineIndex);
          const levelPrefix = section.levelNumber ? 'H' + section.levelNumber + ': ' : '';
          opt.textContent = levelPrefix + section.text;
          els.sectionJump.appendChild(opt);
        });
      }

      function getCurrentRestoreMarker() {
        const current = state.lines[state.activeLineIndex];
        return current ? {
          lineId: current.id || '',
          lineText: current.text || ''
        } : { lineId: '', lineText: '' };
      }

      function findBestRestoreIndex(marker) {
        if (!state.lines.length) return 0;

        if (marker && marker.lineId) {
          const idIndex = state.lines.findIndex(line => line.id === marker.lineId);
          if (idIndex >= 0) return idIndex;
        }

        if (marker && marker.lineText) {
          const exactMatches = state.lines
            .map((line, index) => ({ line, index }))
            .filter(entry => entry.line.text === marker.lineText);

          if (exactMatches.length === 1) return exactMatches[0].index;
          if (exactMatches.length > 1) {
            const nearest = exactMatches.reduce((best, entry) => {
              return Math.abs(entry.index - state.activeLineIndex) < Math.abs(best.index - state.activeLineIndex)
                ? entry
                : best;
            });
            return nearest.index;
          }
        }

        return Math.min(state.activeLineIndex, Math.max(0, state.lines.length - 1));
      }

      function renderPayload(payload, restoreMarker) {
        state.payload = payload;
        state.lines = payload.lines || [];
        state.sections = payload.sections || [];
        state.lastLoadedVersion = payload.version || '';
        state.isSelectionSnapshot = payload.sourceMode === 'selection';

        const metaParts = [payload.sourceMode || state.sourceMode, (state.lines.length + ' lines')];
        if (payload.warning) metaParts.push(payload.warning);
        els.docTitle.textContent = payload.title || 'Untitled document';
        els.docMeta.textContent = metaParts.join(' · ');

        buildSectionJump(state.sections);

        const html = state.lines.map((line, idx) => {
          const classes = ['line', `line-${line.kind || 'paragraph'}`];
          if (line.isCue) classes.push('line-cue');
          return `
            <div
              class="${classes.join(' ')}"
              data-line-index="${idx}"
              data-section-id="${escapeHtml(line.sectionId || '')}">
              ${escapeHtml(line.text || '')}
            </div>
          `;
        }).join('');

        els.readerContent.innerHTML = html;
        els.readerContent.style.fontSize = state.fontSize + 'px';

        const newIndex = findBestRestoreIndex(restoreMarker || {});
        setActiveLine(newIndex, false);
        stopPlayback();
        updateProgress();
      }

      function loadPayload(options) {
        const preserveLine = options && options.preserveLine;
        const restoreMarker = preserveLine ? getCurrentRestoreMarker() : null;
        const wasPlaying = state.isPlaying;

        stopPlayback();
        setStatus('Refreshing...');

        google.script.run
          .withSuccessHandler(function (payload) {
            renderPayload(payload, restoreMarker);
            restartPollingIfNeeded();
            setStatus(payload.warning ? payload.warning : 'Up to date');
            if (wasPlaying && state.lines.length > 1) {
              startPlayback();
            }
          })
          .withFailureHandler(function (err) {
            setStatus('Refresh failed');
            els.docMeta.textContent = err && err.message ? err.message : String(err);
          })
          .getDocumentPayloadById(state.docId, state.sourceMode, state.selectionToken);
      }

      function toggleTheme() {
        state.theme = state.theme === 'light' ? 'dark' : 'light';
        applyThemeUi();
        savePreferences();
      }

      function toggleFocusMode() {
        state.focusMode = !state.focusMode;
        applyFocusUi();
        savePreferences();
      }

      function maybePollForChanges() {
        if (!state.docId || state.isSelectionSnapshot) return;

        google.script.run
          .withSuccessHandler(function (versionInfo) {
            if (!versionInfo || !versionInfo.version) return;
            if (state.lastLoadedVersion && versionInfo.version !== state.lastLoadedVersion) {
              loadPayload({ preserveLine: true });
            }
          })
          .withFailureHandler(function () {
            /* keep polling quiet for MVP */
          })
          .getDocumentVersionById(state.docId);
      }

      function startPolling() {
        if (state.isSelectionSnapshot) return;
        if (state.pollTimer) clearInterval(state.pollTimer);
        state.pollTimer = setInterval(maybePollForChanges, 8000);
      }

      function restartPollingIfNeeded() {
        if (state.pollTimer) {
          clearInterval(state.pollTimer);
          state.pollTimer = null;
        }
        if (!state.isSelectionSnapshot) {
          startPolling();
        }
      }

      els.playPauseBtn.addEventListener('click', togglePlayback);
      els.lineBackBtn.addEventListener('click', function () {
        setActiveLine(state.activeLineIndex - 1, true);
      });
      els.lineForwardBtn.addEventListener('click', function () {
        setActiveLine(state.activeLineIndex + 1, true);
      });
      els.speedInput.addEventListener('input', function () {
        state.speed = parseFloat(this.value);
        updateProgress();
        savePreferences();
        if (state.isPlaying) startPlayback();
      });
      els.fontSizeInput.addEventListener('input', function () {
        state.fontSize = parseInt(this.value, 10);
        els.readerContent.style.fontSize = state.fontSize + 'px';
        const lineEl = els.readerContent.querySelector(`.line[data-line-index="${state.activeLineIndex}"]`);
        if (lineEl) keepLineInView(lineEl);
        savePreferences();
      });
      els.sectionJump.addEventListener('change', function () {
        if (!this.value) return;
        const lineIndex = parseInt(this.value, 10);
        setActiveLine(lineIndex, true);
      });
      els.refreshBtn.addEventListener('click', function () {
        loadPayload({ preserveLine: true });
      });
      els.themeBtn.addEventListener('click', toggleTheme);
      els.focusBtn.addEventListener('click', toggleFocusMode);

      document.addEventListener('keydown', function (e) {
        const tag = (e.target && e.target.tagName) ? e.target.tagName.toLowerCase() : '';
        if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

        if (e.code === 'Space') {
          e.preventDefault();
          togglePlayback();
          return;
        }
        if (e.code === 'ArrowLeft' || e.code === 'ArrowUp') {
          e.preventDefault();
          setActiveLine(state.activeLineIndex - 1, true);
          return;
        }
        if (e.code === 'ArrowRight' || e.code === 'ArrowDown') {
          e.preventDefault();
          setActiveLine(state.activeLineIndex + 1, true);
          return;
        }
        if (e.key === 'd' || e.key === 'D') {
          e.preventDefault();
          toggleTheme();
          return;
        }
        if (e.key === 'f' || e.key === 'F') {
          e.preventDefault();
          toggleFocusMode();
          return;
        }
        if (e.key === 'r' || e.key === 'R') {
          e.preventDefault();
          loadPayload({ preserveLine: true });
          return;
        }
        if (e.key === '[') {
          e.preventDefault();
          state.speed = Math.max(0.2, Math.round((state.speed - 0.1) * 10) / 10);
          els.speedInput.value = state.speed.toFixed(1);
          updateProgress();
          savePreferences();
          if (state.isPlaying) startPlayback();
          return;
        }
        if (e.key === ']') {
          e.preventDefault();
          state.speed = Math.min(3.0, Math.round((state.speed + 0.1) * 10) / 10);
          els.speedInput.value = state.speed.toFixed(1);
          updateProgress();
          savePreferences();
          if (state.isPlaying) startPlayback();
        }
      });

      window.addEventListener('beforeunload', function () {
        stopPlayback();
        if (state.pollTimer) clearInterval(state.pollTimer);
      });

      loadPreferences();
      applyPreferenceUi();
      loadPayload();
    </script>
  </body>
</html>
