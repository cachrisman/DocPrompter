name: Deploy Apps Script HEAD

on:
  push:
    branches: [main]

jobs:
  deploy-head:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.9.0

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run checks
        run: |
          pnpm run --if-present lint
          pnpm run --if-present test

      - name: Write clasp credentials
        run: |
          printf '%s' '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json
          printf '%s' '${{ secrets.CLASP_JSON }}' > .clasp.json

      - name: Push latest code to Apps Script HEAD
        run: pnpm exec clasp push --force
