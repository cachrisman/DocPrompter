name: Deploy Apps Script HEAD

on:
  push:
    branches: [main]

jobs:
  deploy-head:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package.json found, skipping npm install"
          fi

      - name: Run checks
        run: |
          if [ -f package.json ]; then
            npm run lint --if-present
            npm test --if-present
          else
            echo "No package.json found, skipping checks"
          fi

      - name: Write clasp credentials
        run: |
          printf '%s' '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json
          printf '%s' '${{ secrets.CLASP_JSON }}' > .clasp.json

      - name: Push latest code to Apps Script HEAD
        run: |
          npx @google/clasp push --force